name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Note: triggered from a branch of release/1.2.3 will push to https://www.nuget.org/packages/ProwlAppSharp/ as v1.2.3

on:
  create:
    branches:
      - release/**
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    env:
      BUILD_CONFIG: 'Release'
      PROJECT_NAME: 'ProwlAppSharp.csproj'
      SOLUTION_NAME: 'ProwlAppSharp.slnx'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get Build Version
        # GITHUB_REF = current branch or tag
        run: |
          Import-Module .\build\GetBuildVersion.psm1
          Write-Host $Env:GITHUB_REF
          $version = GetBuildVersion -VersionString $Env:GITHUB_REF
          echo "BUILD_VERSION=$version" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_NAME

      - name: Build
        run: dotnet build $SOLUTION_NAME --configuration $BUILD_CONFIG -p:Version=$BUILD_VERSION --no-restore

      - name: Test
        env:
          PROWL_API_KEY: ${{ secrets.PROWL_API_KEY }}
        run: dotnet test ProwlAppSharp.Tests/ProwlAppSharp.Tests.csproj --configuration $BUILD_CONFIG --no-build

      - name: Publish
        if: startsWith(github.ref, 'refs/heads/release')
        run: dotnet nuget push 'bin/Release/*.nupkg' --source 'https://api.nuget.org/v3/index.json' --api-key '${{secrets.NUGET_API_KEY}}' --skip-duplicate
